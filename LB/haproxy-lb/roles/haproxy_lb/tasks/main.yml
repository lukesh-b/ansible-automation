---
- name: Install HAProxy
  yum:
    name: haproxy
    state: present

- name: Configure haproxy.cfg
  template:
    src: haproxy.cfg.j2
    dest: /etc/haproxy/haproxy.cfg
    backup: yes
  notify: Restart HAProxy

- name: Enable and start HAProxy
  service:
    name: haproxy
    enabled: yes
    state: started

- name: Allow HTTP through firewalld
  firewalld:
    service: http
    permanent: yes
    state: enabled
    immediate: yes

